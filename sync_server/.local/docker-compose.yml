services:
  postgres:
    image: postgres:16
    container_name: guyantools-sync-postgres-local
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: laityh
      POSTGRES_PASSWORD: "20030303"
    ports:
      - "127.0.0.1:5430:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U laityh -d mydb"]
      interval: 5s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7
    container_name: guyantools-sync-redis-local
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30

  minio:
    image: minio/minio:latest
    container_name: guyantools-sync-minio-local
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: guyantools
      MINIO_ROOT_PASSWORD: guyantools-sync-2026
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 30
