name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  validate:
    name: Desktop and core checks
    runs-on: ubuntu-latest
    env:
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - name: Restore pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Restore Rust cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            multi_platform_core/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('multi_platform_core/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Desktop lint
        run: pnpm --dir desktop run lint

      - name: Desktop typecheck
        run: pnpm --dir desktop run typecheck

      - name: Design system lint
        run: pnpm --dir desktop run lint:design-system

      - name: Feature verifiers
        run: pnpm --dir desktop run verify:features

      - name: Rust tests
        run: cargo test --manifest-path multi_platform_core/Cargo.toml --features desktop-native
